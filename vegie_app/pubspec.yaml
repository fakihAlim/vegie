name: loving_harmony
description: "LovingHarmony - Vegetarian Food Logging App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.1
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.10
  image_picker: ^1.0.7
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.8.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  sqflite_common_ffi_web: ^1.1.1
  flutter_image_compress: ^2.3.0
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
