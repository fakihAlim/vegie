name: loving_harmony
description: "LovingHarmony - Vegetarian Food Logging App"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.1
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  image_picker: ^1.0.7
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.8.3
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  connectivity_plus: ^7.1.1
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  sqflite_common_ffi_web: ^1.1.1
  flutter_image_compress: ^2.3.0
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0
  lottie: ^3.1.0
  flutter_markdown: ^0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/avatars/
    - assets/lottie/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/Icon/love-plant.png"
